<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Chamados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
        }

        .table-dark th {
            background-color: #1a237e;
        }
    </style>
</head>

<body class="bg-dark text-light" data-bs-theme="dark">

    <div class="container mt-5">
        <a href="/" class="btn btn-link text-decoration-none text-light mb-3">← Voltar para o Início</a>

        <div class="card bg-secondary bg-opacity-25 shadow-lg">
            <div class="card-header text-center py-3"
                style="background: linear-gradient(135deg, #1a237e, #283593); border-bottom: 1px solid #3a3a3a;">
                <h4 class="mb-0 text-white">📜 Histórico de Chamados</h4>
            </div>

            <div class="card-body p-4">
                <div th:if="${#lists.isEmpty(registros)}" class="text-center text-secondary py-5">
                    <h5>Nenhum chamado registrado ainda.</h5>
                    <p>Os chamados gerados aparecerão aqui automaticamente.</p>
                </div>

                <div th:if="${!#lists.isEmpty(registros)}" class="table-responsive">
                    <table class="table table-dark table-striped table-hover align-middle">
                        <thead>
                            <tr>
                                <th scope="col">#</th>
                                <th scope="col">Data</th>
                                <th scope="col">Tipo de Chamado</th>
                                <th scope="col">Resumo</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="item, status : ${registros}">
                                <td th:text="${status.count}"></td>
                                <td th:text="${#temporals.format(item.dataCriacao, 'dd/MM/yyyy HH:mm')}"></td>
                                <td>
                                    <span class="badge bg-primary" th:if="${item.tipoChamado == 'Escalonamento PJe'}"
                                        th:text="${item.tipoChamado}"></span>
                                    <span class="badge bg-success"
                                        th:if="${item.tipoChamado == 'Substituição de Monitor'}"
                                        th:text="${item.tipoChamado}"></span>
                                    <span class="badge bg-danger" th:if="${item.tipoChamado == 'Remoção do AD'}"
                                        th:text="${item.tipoChamado}"></span>
                                    <span class="badge bg-warning text-dark"
                                        th:if="${item.tipoChamado == 'Devolução de Equipamento'}"
                                        th:text="${item.tipoChamado}"></span>
                                </td>
                                <td th:text="${item.resumo}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
