<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Chamado PJe - N3</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YcnS49V4sFwPkOMQJw9YFe4SnDO2LouLRG0S"
          crossorigin="anonymous">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #121212;
        }
        .card {
            border: 1px solid #2d2d2d;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
        }
        .card-header {
            background: linear-gradient(135deg, #1a237e, #283593);
            border-bottom: 1px solid #2d2d2d;
        }
        .btn-primary {
            background: linear-gradient(135deg, #1565c0, #1a237e);
            border: none;
        }
        .btn-primary:hover {
            background: linear-gradient(135deg, #1976d2, #283593);
        }
        .resultado-area {
            background-color: #1e1e1e;
            border: 1px solid #3d3d3d;
            color: #e0e0e0;
            font-family: 'Consolas', 'Courier New', monospace;
            resize: none;
        }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">

            <div class="card">
                <div class="card-header text-center py-3">
                    <h4 class="mb-0 text-white">
                        <i class="bi bi-clipboard-check"></i> Gerador de Chamado N3 - PJe
                    </h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/pje/gerar}" th:object="${chamado}" method="post">

                        <div class="mb-3">
                            <label for="numeroProcesso" class="form-label">Número do Processo</label>
                            <input type="text" class="form-control" id="numeroProcesso"
                                   th:field="*{numeroProcesso}" placeholder="Ex: 0000000-00.0000.0.00.0000">
                        </div>

                        <div class="mb-3">
                            <label for="nomeUsuario" class="form-label">Nome do Usuário Afetado</label>
                            <input type="text" class="form-control" id="nomeUsuario"
                                   th:field="*{nomeUsuario}" placeholder="Nome completo do usuário">
                        </div>

                        <div class="mb-3">
                            <label for="cpfCnpj" class="form-label">CPF/CNPJ</label>
                            <input type="text" class="form-control" id="cpfCnpj"
                                   th:field="*{cpfCnpj}" placeholder="Documento do usuário">
                        </div>

                        <div class="mb-3">
                            <label for="moduloSistema" class="form-label">Módulo do Sistema</label>
                            <select class="form-select" id="moduloSistema" th:field="*{moduloSistema}">
                                <option value="">Selecione o módulo...</option>
                                <option value="PJe 1º Grau">PJe 1º Grau</option>
                                <option value="PJe 2º Grau">PJe 2º Grau</option>
                                <option value="PJeCalc">PJeCalc</option>
                                <option value="PJe Corregedoria">PJe Corregedoria</option>
                                <option value="PJe Administrativo">PJe Administrativo</option>
                                <option value="Outro">Outro</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="descricaoErro" class="form-label">Descrição do Erro</label>
                            <textarea class="form-control" id="descricaoErro"
                                      th:field="*{descricaoErro}" rows="4"
                                      placeholder="Descreva detalhadamente o erro encontrado..."></textarea>
                        </div>

                        <div class="mb-3">
                            <label for="linkPrint" class="form-label">Link do Print / Evidência</label>
                            <input type="text" class="form-control" id="linkPrint"
                                   th:field="*{linkPrint}" placeholder="Cole o link da imagem ou print aqui">
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">
                                🚀 Gerar Chamado
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Área do Texto Gerado -->
            <div th:if="${textoFormatado}" class="card mt-4">
                <div class="card-header text-center py-3">
                    <h5 class="mb-0 text-white">📋 Texto do Chamado Gerado</h5>
                </div>
                <div class="card-body p-4">
                    <textarea class="form-control resultado-area" rows="10" readonly
                              th:text="${textoFormatado}"></textarea>
                    <div class="d-grid mt-3">
                        <button class="btn btn-outline-light" onclick="copiarTexto()">
                            📄 Copiar Texto
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function copiarTexto() {
        const textarea = document.querySelector('.resultado-area');
        textarea.select();
        document.execCommand('copy');
        const btn = document.querySelector('.btn-outline-light');
        btn.textContent = '✅ Copiado!';
        setTimeout(() => btn.textContent = '📄 Copiar Texto', 2000);
    }
</script>

</body>
</html>
